<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Lista de Tarefas</h1>
    <p>Esta é a sua lista de tarefas.<br>Digite sua nova tarefa e clique em "Adicionar".</p>
    <main>
        <input type="text" id="tarefa" placeholder="Digite sua tarefa aqui">
        <input type="time" id="hora" placeholder="Hora (opcional)">
        <button id="adicionar">Adicionar</button>
        <ul id="lista"></ul>
    </main>

    <p><span id="contador">Total de tarefas: 0</span></p>
    <div id="botoes">
        <button  id="concluidas">Concluídas</button>
        <button  id="pendentes">Pendentes</button>
        <button  id="todas">Todas</button>
    </div>
    <button id="limpar">Limpar Lista</button>
    
</body>
</html>
